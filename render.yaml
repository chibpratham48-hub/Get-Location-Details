# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: landmark-api
    runtime: node
    buildCommand: npm install && npm run compile-data
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
        value: "*"
      # Optional overrides:
      # MAX_DISTANCE_THRESHOLD_KM, RATE_LIMIT_MAX, MAX_LOCATION_LENGTH, JSON_BODY_LIMIT
