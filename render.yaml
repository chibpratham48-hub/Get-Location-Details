# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: landmark-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      # Optional overrides:
      # GEMINI_MODEL, RATE_LIMIT_MAX, MAX_LOCATION_LENGTH, JSON_BODY_LIMIT
